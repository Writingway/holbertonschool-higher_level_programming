<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Items List</title>
</head>
<body>
    <ul>
    <!-- Empty list No items found -->
    {% if not items %}
      <li>No items found</li>
    {% endif %}
    {% for item in items %}
      <li>{{ item }}</li>
    {% endfor %}
  </ul>
</body>
</html>
