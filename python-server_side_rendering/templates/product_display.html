<!-- display the data in a table format with headings for Name, Category, and Price. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Display</title>
</html>
<body>
  <h1>Product List</h1>
  <table border="1">
    <tr>
      <th>Name</th>
      <th>Category</th>
      <th>Price</th>
    </tr>
    {% for product in products %}
    <tr>
      <td>{{ product.name }}</td>
      <td>{{ product.category }}</td>
      <td>${{ product.price }}</td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
